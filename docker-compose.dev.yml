version: '3.8'

services:
  dev:
    image: node:lts-alpine
    working_dir: /app
    volumes:
      - .:/app                              # Dein Code
      - node_modules:/app/node_modules      # Named Volume (persistent & schnell)
      - npm_cache:/root/.npm                # Bonus: Cache npm downloads
    ports:
      - "8080:8080"
    command: sh -c "npm install --legacy-peer-deps && npm run serve -- --host 0.0.0.0 --port 8080"
    environment:
      - NODE_ENV=development

volumes:
  node_modules:  # Persistent zwischen Restarts
  npm_cache:     # Cached npm packages