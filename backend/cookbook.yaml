  steps:
    - step: >-
        Die Zwiebel würfeln und in etwas Butterschmalz glasig dünsten.
        Ordentlich salzen und pfeffern. Den Grünkohl dazugeben, gut durchrühren,
        etwas auf Temperatur bringen und die Brühe angießen. Das Ganze bei
        mittlerer Temperatur mit geschlossenem Deckel 20 Minuten garen.
      haccp:
        time_temperature_controlled: false
        high_risk_ingredient: false
      notes:
        - ''
      section: ''
    - step: >-
        In der Zwischenzeit die Kartoffeln schälen und würfeln. Nach der Garzeit
        die Kartoffeln zum Grünkohl geben, gut umrühren, Deckel wieder drauf und
        weitere 20 Minuten köcheln lassen.
      haccp:
        time_temperature_controlled: false
        high_risk_ingredient: false
      notes:
        - ''
      section: ''
    - step: >-
        Danach die Mettenden dazugeben, weitere 10 Minuten garen lassen. Zum
        Schluss die Würste herausnehmen, in Scheiben schneiden und wieder
        zufügen.
      haccp:
        time_temperature_controlled: false
        high_risk_ingredient: false
      notes:
        - ''
      section: ''
    - step: Evtl. noch mal nachwürzen, das ist aber meist nicht nötig.
