    - step: Küchenmaschine auf 35°C vorheizen.
      section: Boden
    - step: >-
        Alle Zutaten zu einem Teig herstellen. Auf einem Backbleck ausrollen.
        Hinweis: Lauwarme Milch über die Hefe schütten.
      section: Boden
    - step: Zucker und Speisestärke mit etwas Milch im Simmertopf glattrühren.
      section: Pudding
    - step: >-
        Eigelb und Vanilleextraxt sowie restliche Milch hinzufügen und
        verrühren.
      section: Pudding
    - step: Pudding unter Rühren im Simmertopf erhitzen, bis er abgebunden hat.
      section: Pudding
    - step: >-
        Warmen Pudding unter Rühren abkühlen. Tipp: Kaltes Wasser in den
        Simmertopf geben.
      section: Pudding
