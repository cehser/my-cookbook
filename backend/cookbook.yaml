        Nach und nach die Butter hinzugeben, bis eine schöne Streusel-Konsistenz
        erreicht ist.
      section: Streusel
    - step: Streusel über dem Pudding verteilen.
      section: Streusel
    - step: >-
        Kuchen bei 180-200°C Ober-/Unterhitze 15-20 Minuten backen, bis die
        Streusel goldbraun sind.
      section: Streusel
